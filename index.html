<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="card">
        <img
          class="card__image"
          src="./assets/images/avatar-jessica.jpeg"
          alt=""
        />
        <div>
          <h2 class="card__title">Jessica Randall</h2>
          <span class="card__location"> London, United Kingdom</span>
        </div>
        <blockquote class="card__quote">
          "Front-end developer and avid reader."
        </blockquote>
        <ul class="card__list">
          <li class="card__item">
            <a class="card__link" target="_blank" href="#">GitHub</a>
          </li>
          <li class="card__item">
            <a class="card__link" target="_blank" href="#">Frontend Mentor</a>
          </li>
          <li class="card__item">
            <a class="card__link" target="_blank" href="#">LinkedIn</a>
          </li>
          <li class="card__item">
            <a class="card__link" target="_blank" href="#">Twitter</a>
          </li>
          <li class="card__item">
            <a class="card__link" target="_blank" href="#">Instagram</a>
          </li>
        </ul>
      </div>
    </main>

    <div class="attribution">
      Challenge by
      <a
        class="attribution__link"
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a class="attribution__link" href="https://rubendeman.nl" target="_blank"
        >Ruben de Man</a
      >.
    </div>
  </body>
</html>
