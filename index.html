<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <meta
      name="description"
      content="Social links profile card for Jessica Randall, a front-end developer."
    />
    <meta
      name="keywords"
      content="social,links,profile,card,Jessica,Randall,front-end,developer"
    />
    <meta name="Ruben de Man" content="Ruben de Man" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <article class="card">
        <img
          class="card__image"
          src="./assets/images/avatar-jessica.jpeg"
          width="88"
          height="88"
          alt="Portrait of Jessica Randall, a front-end developer"
        />
        <div class="card__details">
          <h2 class="card__name">Jessica Randall</h2>
          <span class="card__location"> London, United Kingdom</span>
        </div>
        <blockquote class="card__text">
          "Front-end developer and avid reader."
        </blockquote>
        <ul class="card__list">
          <li class="card__item">
            <a class="card__link" href="#">GitHub</a>
          </li>
          <li class="card__item">
            <a class="card__link" href="#">Frontend Mentor</a>
          </li>
          <li class="card__item">
            <a class="card__link" href="#">LinkedIn</a>
          </li>
          <li class="card__item">
            <a class="card__link" href="#">Twitter</a>
          </li>
          <li class="card__item">
            <a class="card__link" href="#">Instagram</a>
          </li>
        </ul>
      </article>
    </main>

    <footer class="attribution">
      <p>
        Challenge by
        <a
          class="attribution__link"
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          >Frontend Mentor</a
        >. Coded by
        <a
          class="attribution__link"
          href="https://rubendeman.nl"
          target="_blank"
          >Ruben de Man</a
        >.
      </p>
    </footer>
  </body>
</html>
