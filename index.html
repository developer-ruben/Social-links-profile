<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <article class="profile-card">
        <img
          class="profile-card__avatar"
          src="./assets/images/avatar-jessica.jpeg"
          width="176"
          height="176"
          alt="Jessica Randall's profile picture"
        />
        <div>
          <h2 class="profile-card__name">Jessica Randall</h2>
          <span class="profile-card__location" aria-label="Location"
            >London, United Kingdom</span
          >
        </div>
        <p class="profile-card__quote">
          "Front-end developer and avid reader."
        </p>
        <ul class="profile-card__list">
          <li class="profile-card__item">
            <a
              href="#"
              class="profile-card__link"
              aria-label="Visit Jessica's GitHub profile"
              >GitHub</a
            >
          </li>
          <li class="profile-card__item">
            <a
              href="#"
              class="profile-card__link"
              aria-label="Visit Jessica's Frontend Mentor profile"
              >Frontend Mentor</a
            >
          </li>
          <li class="profile-card__item">
            <a
              href="#"
              class="profile-card__link"
              aria-label="Visit Jessica's LinkedIn profile"
              >LinkedIn</a
            >
          </li>
          <li class="profile-card__item">
            <a
              href="#"
              class="profile-card__link"
              aria-label="Visit Jessica's Twitter profile"
              >Twitter</a
            >
          </li>
          <li class="profile-card__item">
            <a
              href="#"
              class="profile-card__link"
              aria-label="Visit Jessica's Instagram profile"
              >Instagram</a
            >
          </li>
        </ul>
      </article>
    </main>

    <footer class="attribution">
      <p>
        Challenge by
        <a
          class="attribution__link"
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          aria-label="Visit Frontend Mentor's website"
          >Frontend Mentor</a
        >. Coded by
        <a
          class="attribution__link"
          href="https://rubendeman.nl"
          target="_blank"
          aria-label="Visit Ruben de Man's website"
          >Ruben de Man</a
        >.
      </p>
    </footer>
  </body>
</html>
